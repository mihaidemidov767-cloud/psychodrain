<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@psychodrain</title>
    <!-- Подключаем Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Подключаем CSS для YTPlayer -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jquery.mb.YTPlayer/3.3.9/css/jquery.mb.YTPlayer.min.css">
    <style>
        /* Стили для страницы */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Затемнение поверх видео */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 1;
            pointer-events: none;
        }

        /* КНОПКА ЗВУКА В ЛЕВОМ ВЕРХНЕМ УГЛУ */
        .sound-button {
            position: fixed;
            top: 25px;
            left: 25px;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: rgba(20, 20, 30, 0.8);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(0, 255, 255, 0.5);
            color: white;
            font-size: 24px;
            cursor: pointer;
            z-index: 3;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 
                0 0 15px rgba(0, 255, 255, 0.5),
                0 0 30px rgba(255, 0, 255, 0.3),
                inset 0 0 10px rgba(255, 255, 255, 0.3);
            animation: buttonPulse 3s ease-in-out infinite;
        }

        .sound-button:hover {
            transform: scale(1.1);
            border-color: rgba(255, 0, 255, 0.8);
            box-shadow: 
                0 0 20px rgba(255, 0, 255, 0.7),
                0 0 40px rgba(0, 255, 255, 0.5);
        }

        .sound-button i {
            filter: drop-shadow(0 0 5px currentColor);
        }

        @keyframes buttonPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; box-shadow: 0 0 25px rgba(0, 255, 255, 0.8), 0 0 50px rgba(255, 0, 255, 0.5); }
        }

        /* Неоновая панелька */
        .container {
            background: rgba(20, 20, 30, 0.75);
            backdrop-filter: blur(12px);
            padding: 2.5rem;
            border-radius: 30px;
            text-align: center;
            max-width: 420px;
            width: 90%;
            margin: 20px;
            position: relative;
            z-index: 2;
            
            /* НЕОНОВОЕ СВЕЧЕНИЕ */
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 
                0 0 20px rgba(0, 255, 255, 0.3),
                0 0 40px rgba(255, 0, 255, 0.2),
                0 0 60px rgba(0, 255, 255, 0.1),
                inset 0 0 20px rgba(255, 255, 255, 0.2);
            
            /* Анимация смены цветов */
            animation: neonGlow 8s ease-in-out infinite;
        }

        /* Анимация для неонового свечения */
        @keyframes neonGlow {
            0% {
                box-shadow: 
                    0 0 20px rgba(0, 255, 255, 0.4),
                    0 0 40px rgba(255, 0, 255, 0.3),
                    0 0 60px rgba(0, 255, 255, 0.2),
                    inset 0 0 20px rgba(255, 255, 255, 0.2);
                border-color: rgba(0, 255, 255, 0.3);
            }
            25% {
                box-shadow: 
                    0 0 20px rgba(255, 0, 255, 0.4),
                    0 0 40px rgba(0, 255, 255, 0.3),
                    0 0 60px rgba(255, 0, 255, 0.2),
                    inset 0 0 20px rgba(255, 255, 255, 0.2);
                border-color: rgba(255, 0, 255, 0.3);
            }
            50% {
                box-shadow: 
                    0 0 20px rgba(0, 255, 150, 0.4),
                    0 0 40px rgba(255, 150, 0, 0.3),
                    0 0 60px rgba(0, 255, 150, 0.2),
                    inset 0 0 20px rgba(255, 255, 255, 0.2);
                border-color: rgba(0, 255, 150, 0.3);
            }
            75% {
                box-shadow: 
                    0 0 20px rgba(150, 0, 255, 0.4),
                    0 0 40px rgba(255, 150, 0, 0.3),
                    0 0 60px rgba(150, 0, 255, 0.2),
                    inset 0 0 20px rgba(255, 255, 255, 0.2);
                border-color: rgba(150, 0, 255, 0.3);
            }
            100% {
                box-shadow: 
                    0 0 20px rgba(0, 255, 255, 0.4),
                    0 0 40px rgba(255, 0, 255, 0.3),
                    0 0 60px rgba(0, 255, 255, 0.2),
                    inset 0 0 20px rgba(255, 255, 255, 0.2);
                border-color: rgba(0, 255, 255, 0.3);
            }
        }

        h1 {
            color: white;
            margin-bottom: 0.5rem;
            font-size: 2.2rem;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        p {
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 2rem;
            font-size: 1.1rem;
            text-shadow: 0 0 5px rgba(255, 0, 255, 0.3);
        }

        .social-links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .social-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 1rem;
            border-radius: 50px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(5px);
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
        }

        .social-link:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 0 25px currentColor;
            filter: brightness(1.2);
            border-color: white;
        }

        .social-link i {
            font-size: 1.5rem;
            filter: drop-shadow(0 0 5px currentColor);
        }

        /* Индивидуальные цвета соцсетей с неоном */
        .telegram { background: #0088cc; box-shadow: 0 0 20px #0088cc; }
        .youtube { background: #FF0000; box-shadow: 0 0 20px #FF0000; }
        .tiktok { background: #000000; box-shadow: 0 0 20px #ff00ff; }
        .vkontakte { background: #4C75A3; box-shadow: 0 0 20px #4C75A3; }
        .soundcloud { background: #FF7700; box-shadow: 0 0 20px #FF7700; }

        /* Стили для контроллера громкости (теперь в углу только кнопка, слайдер убрали) */
        .volume-control {
            margin-top: 1.5rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
        }

        .volume-control i {
            color: white;
            font-size: 1.2rem;
            width: 24px;
            filter: drop-shadow(0 0 5px cyan);
        }

        .volume-slider {
            flex: 1;
            height: 6px;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: cyan;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid white;
            box-shadow: 0 0 15px cyan;
        }

        .volume-slider::-webkit-slider-thumb:hover {
            transform: scale(1.15);
            background: magenta;
            box-shadow: 0 0 20px magenta;
        }

        .volume-percent {
            min-width: 45px;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            text-shadow: 0 0 5px cyan;
        }
    </style>
</head>
<body>
    <!-- YouTube фон со звуком -->
    <div class="ytplayer" data-property="{
        videoURL: 'https://www.youtube.com/watch?v=WPxd8Ng9-x0',
        containment: 'body',
        autoPlay: true,
        mute: false,
        startAt: 0,
        opacity: 1,
        loop: true,
        showControls: false,
        showYTLogo: false,
        addRaster: false,
        quality: 'hd1080',
        optimizeDisplay: true,
        stopMovieOnBlur: false,
        realfullscreen: true,
        volume: 50
    }"></div>

    <!-- Затемняющий слой -->
    <div class="overlay"></div>

    <!-- КНОПКА ЗВУКА В ЛЕВОМ ВЕРХНЕМ УГЛУ -->
    <button class="sound-button" id="soundToggle">
        <i class="fas fa-volume-high" id="soundIcon"></i>
    </button>

    <div class="container">
        <h1>Связь</h1>
        <p>👋</p>

        <div class="social-links">
            <a href="https://t.me/psychodrain" target="_blank" class="social-link telegram">
                <i class="fab fa-telegram-plane"></i> Telegram
            </a>
            
            <a href="https://www.youtube.com/@mishanya_atarax" target="_blank" class="social-link youtube">
                <i class="fab fa-youtube"></i> YouTube
            </a>
            
            <a href="https://tiktok.com/@kaceiiii" target="_blank" class="social-link tiktok">
                <i class="fab fa-tiktok"></i> TikTok
            </a>
            
            <a href="https://vk.com/gang_tyumen" target="_blank" class="social-link vkontakte">
                <i class="fab fa-vk"></i> ВКонтакте
            </a>
            
            <a href="https://soundcloud.com/mishanyalirikov" target="_blank" class="social-link soundcloud">
                <i class="fab fa-soundcloud"></i> SoundCloud
            </a>
        </div>

        <!-- ПОЛЗУНОК ГРОМКОСТИ (оставил на месте, но можно скрыть если не нужен) -->
        <div class="volume-control">
            <i class="fas fa-volume-high" id="volumeIcon"></i>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="50">
            <span class="volume-percent" id="volumePercent">50%</span>
        </div>
    </div>

    <!-- Подключаем jQuery и YTPlayer -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mb.YTPlayer/3.3.9/jquery.mb.YTPlayer.min.js"></script>
    
    <script>
        $(document).ready(function() {
            // Активируем YouTube плеер
            $(".ytplayer").YTPlayer();
            
            // Даем время на загрузку плеера
            setTimeout(() => {
                // Работа с кнопкой в углу и ползунком
                initVolumeControl();
            }, 1500);

            function initVolumeControl() {
                const ytPlayer = $(".ytplayer").data("ytPlayer");
                if (!ytPlayer || !ytPlayer.player) {
                    setTimeout(initVolumeControl, 500);
                    return;
                }

                const player = ytPlayer.player;
                
                // Элементы управления
                const soundToggle = document.getElementById('soundToggle');
                const soundIcon = document.getElementById('soundIcon');
                const volumeSlider = document.getElementById('volumeSlider');
                const volumePercent = document.getElementById('volumePercent');
                const volumeIcon = document.getElementById('volumeIcon');
                
                let lastVolume = 50;
                let isMuted = false;

                // Устанавливаем начальную громкость
                if (player.setVolume) {
                    player.setVolume(50);
                }

                // Функция обновления иконок
                function updateIcons(volume) {
                    // Иконка в углу
                    if (volume == 0) {
                        soundIcon.className = 'fas fa-volume-mute';
                        volumeIcon.className = 'fas fa-volume-mute';
                    } else if (volume < 30) {
                        soundIcon.className = 'fas fa-volume-low';
                        volumeIcon.className = 'fas fa-volume-low';
                    } else {
                        soundIcon.className = 'fas fa-volume-high';
                        volumeIcon.className = 'fas fa-volume-high';
                    }
                }

                // Обработка ползунка
                volumeSlider.addEventListener('input', function(e) {
                    const volume = parseInt(e.target.value);
                    volumePercent.textContent = volume + '%';
                    
                    if (player.setVolume) {
                        player.setVolume(volume);
                    }
                    
                    updateIcons(volume);
                    
                    if (volume > 0) {
                        lastVolume = volume;
                        isMuted = false;
                    }
                });

                // КНОПКА В УГЛУ - ТЕПЕРЬ РАБОТАЕТ!
                soundToggle.addEventListener('click', function() {
                    if (!player.getVolume) return;
                    
                    const currentVolume = player.getVolume();
                    
                    if (currentVolume > 0) {
                        // Выключаем звук
                        lastVolume = currentVolume;
                        player.setVolume(0);
                        volumeSlider.value = 0;
                        volumePercent.textContent = '0%';
                        updateIcons(0);
                        isMuted = true;
                    } else {
                        // Включаем звук
                        player.setVolume(lastVolume);
                        volumeSlider.value = lastVolume;
                        volumePercent.textContent = lastVolume + '%';
                        updateIcons(lastVolume);
                        isMuted = false;
                    }
                });

                // Следим за изменениями громкости
                setInterval(() => {
                    if (player.getVolume) {
                        const vol = player.getVolume();
                        if (vol !== parseInt(volumeSlider.value)) {
                            volumeSlider.value = vol;
                            volumePercent.textContent = vol + '%';
                            updateIcons(vol);
                        }
                    }
                }, 100);
            }
        });
    </script>
</body>
</html>
